<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Extreme Sultan Runner</title>
<style>
body { margin:0; overflow:hidden; background:black; }
canvas { display:block; }
</style>
</head>
<body>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = innerWidth;
canvas.height = innerHeight;

// lane
const lanes = [
  canvas.width * 0.3,
  canvas.width * 0.5,
  canvas.width * 0.7
];

let laneIndex = 1;

// player
let player = {
  x: lanes[laneIndex],
  y: canvas.height - 150,
  money: 100
};

let gates = [];
let effects = [];
let cars = [];
let progress = 0;
let shake = 0;

// swipe
let startX = 0;
canvas.addEventListener("touchstart", e => startX = e.touches[0].clientX);
canvas.addEventListener("touchend", e => {
  let dx = e.changedTouches[0].clientX - startX;
  if (dx > 40 && laneIndex < 2) laneIndex++;
  if (dx < -40 && laneIndex > 0) laneIndex--;
});

// spawn gate
setInterval(()=>{
  let r = Math.random();
  let mode = r<0.4?"add":r<0.7?"sub":"mul";
  let value = mode==="mul"?2:Math.floor(Math.random()*20)+10;

  gates.push({
    lane: Math.floor(Math.random()*3),
    y: -60,
    mode,
    value
  });
},800);

// spawn mobil
setInterval(()=>{
  cars.push({
    x: Math.random()*canvas.width,
    y: -60,
    speed: Math.random()*5+3,
    color: ["#0ff","#f0f","#ff0"][Math.floor(Math.random()*3)]
  });
},1000);

// update
function update(){
  player.x += (lanes[laneIndex] - player.x)*0.15;
  progress += 0.003;

  gates.forEach((g,i)=>{
    g.y += 7;

    if(Math.abs(player.x - lanes[g.lane]) < 35 && Math.abs(player.y - g.y) < 35){

      if(g.mode==="add") player.money += g.value;
      if(g.mode==="sub") player.money -= g.value;
      if(g.mode==="mul") player.money *= g.value;

      shake = 10;

      // efek uang ekstrem
      for(let j=0;j<25;j++){
        effects.push({
          x: player.x,
          y: player.y,
          dx:(Math.random()-0.5)*8,
          dy:-Math.random()*8,
          life:50
        });
      }

      gates.splice(i,1);
    }
  });

  cars.forEach((c,i)=>{
    c.y += c.speed;
    if(c.y > canvas.height) cars.splice(i,1);
  });

  effects.forEach((e,i)=>{
    e.x += e.dx;
    e.y += e.dy;
    e.life--;
    if(e.life<=0) effects.splice(i,1);
  });

  if(shake > 0) shake--;

  if(player.money <= 0){
    alert("Game Over!");
    location.reload();
  }
}

// background parallax
function drawBG(){
  let sky = ctx.createLinearGradient(0,0,0,canvas.height);
  sky.addColorStop(0,"#0f2027");
  sky.addColorStop(1,"#2c5364");
  ctx.fillStyle = sky;
  ctx.fillRect(0,0,canvas.width,canvas.height);

  // gedung jauh
  for(let i=0;i<12;i++){
    let x = i*(canvas.width/12);
    let h = 200 + Math.sin(i)*80;

    ctx.fillStyle="#111";
    ctx.fillRect(x, canvas.height-h-250, 60, h);
  }

  // gedung dekat
  for(let i=0;i<12;i++){
    let x = i*(canvas.width/12);
    let h = 250 + Math.cos(i)*100;

    ctx.fillStyle="#000";
    ctx.fillRect(x, canvas.height-h-150, 70, h);
  }

  // jalan
  ctx.fillStyle="#111";
  ctx.beginPath();
  ctx.moveTo(canvas.width*0.2,canvas.height);
  ctx.lineTo(canvas.width*0.4,0);
  ctx.lineTo(canvas.width*0.6,0);
  ctx.lineTo(canvas.width*0.8,canvas.height);
  ctx.fill();
}

// draw
function draw(){
  ctx.save();

  // camera shake
  ctx.translate((Math.random()-0.5)*shake, (Math.random()-0.5)*shake);

  drawBG();

  // player glow
  ctx.shadowColor="gold";
  ctx.shadowBlur=30;
  ctx.fillStyle="gold";
  ctx.beginPath();
  ctx.arc(player.x, player.y, 25, 0, Math.PI*2);
  ctx.fill();
  ctx.shadowBlur=0;

  // uang
  ctx.fillStyle="white";
  ctx.font="20px Arial";
  ctx.textAlign="center";
  ctx.fillText("$"+player.money, player.x, player.y-50);

  // gates
  gates.forEach(g=>{
    ctx.shadowColor=g.mode==="add"?"blue":g.mode==="sub"?"red":"purple";
    ctx.shadowBlur=20;

    ctx.fillStyle=g.mode==="add"?"blue":g.mode==="sub"?"red":"purple";
    ctx.fillRect(lanes[g.lane]-30, g.y, 60, 40);

    ctx.shadowBlur=0;

    ctx.fillStyle="white";
    let txt = g.mode==="add"?"+"+g.value: g.mode==="sub"?"-"+g.value:"x"+g.value;
    ctx.fillText(txt, lanes[g.lane], g.y+25);
  });

  // mobil neon
  cars.forEach(c=>{
    ctx.shadowColor=c.color;
    ctx.shadowBlur=20;
    ctx.fillStyle=c.color;
    ctx.fillRect(c.x, c.y, 60, 25);
    ctx.shadowBlur=0;
  });

  // efek uang
  ctx.fillStyle="gold";
  effects.forEach(e=>{
    ctx.fillRect(e.x, e.y, 5, 5);
  });

  // UI
  ctx.fillStyle="#000";
  ctx.fillRect(canvas.width-140,20,120,50);
  ctx.strokeStyle="gold";
  ctx.strokeRect(canvas.width-140,20,120,50);

  ctx.fillStyle="gold";
  ctx.fillText("$"+player.money, canvas.width-80,50);

  // progress
  ctx.fillStyle="#222";
  ctx.fillRect(50,20,250,12);
  ctx.fillStyle="gold";
  ctx.fillRect(50,20,250*progress,12);

  ctx.restore();
}

// loop
function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
