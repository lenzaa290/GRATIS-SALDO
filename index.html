<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Money Runner Sultan</title>

<style>
body { margin:0; overflow:hidden; font-family:Arial; background:black; }
canvas { display:none; }

#loading {
  position:fixed;
  width:100%;
  height:100%;
  background:black;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:5vw;
}

#intro {
  display:none;
  position:fixed;
  width:100%;
  height:100%;
  background:linear-gradient(#000,#222);
  color:white;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:20px;
}

#intro h1 { color:gold; font-size:6vw; }
#intro p { font-size:4vw; margin:5px 0; }

.btn {
  margin-top:20px;
  padding:12px 25px;
  font-size:4vw;
  background:gold;
  border:none;
  border-radius:12px;
}
</style>
</head>

<body>

<div id="loading">⏳ Memuat...</div>

<div id="intro">
  <h1>💰 Cara Bermain</h1>
  <p>👉 Geser kanan & kiri</p>
  <p>🧺 Kumpulkan uang ke keranjang</p>
  <p>💸 Cairkan ke <b>SALDO Anda</b></p>
  <button class="btn" onclick="startGame()">▶️ Mulai</button>
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = innerWidth;
canvas.height = innerHeight;

// 🔊 AUDIO
const bgMusic = new Audio("https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8b4f4c6a7.mp3?filename=summer-ambient-110998.mp3");
bgMusic.loop = true;
bgMusic.volume = 0.4;

const coinSound = new Audio("https://cdn.pixabay.com/download/audio/2022/03/10/audio_6c3b8f2b74.mp3?filename=coin-collect-1-183142.mp3");
coinSound.volume = 0.8;

// loading
setTimeout(()=>{
  loading.style.display="none";
  intro.style.display="flex";
},1500);

function startGame(){
  intro.style.display="none";
  canvas.style.display="block";
  bgMusic.play();
  loop();
}

// gambar
const bg = new Image();
bg.src = "https://images.unsplash.com/photo-1507525428034-b723cf961d3e";

const moneyImg = new Image();
moneyImg.src = "https://cdn-icons-png.flaticon.com/512/3135/3135706.png";

const basketImg = new Image();
basketImg.src = "https://cdn-icons-png.flaticon.com/512/263/263142.png";

// lane
const lanes = [
  canvas.width * 0.3,
  canvas.width * 0.5,
  canvas.width * 0.7
];

let laneIndex = 1;

let player = {
  x: lanes[laneIndex],
  y: canvas.height - 120,
  money: 100
};

let gates = [];
let suckedMoney = [];

// 🧺 STACK UANG
let basketStack = [];
let maxStack = 20;
let isFull = false;

// swipe
let startX = 0;
canvas.addEventListener("touchstart", e => startX = e.touches[0].clientX);
canvas.addEventListener("touchend", e => {
  let dx = e.changedTouches[0].clientX - startX;
  if (dx > 40 && laneIndex < 2) laneIndex++;
  if (dx < -40 && laneIndex > 0) laneIndex--;
});

// spawn uang
setInterval(()=>{
  gates.push({
    lane: Math.floor(Math.random()*3),
    y: -60,
    rot: 0
  });
},700);

// update
function update(){
  player.x += (lanes[laneIndex] - player.x)*0.2;

  gates.forEach((g,i)=>{
    g.y += 6;
    g.rot += 0.05;

    if(Math.abs(player.x - lanes[g.lane]) < 40 && Math.abs(player.y - g.y) < 40){

      // 🔊 sound
      coinSound.currentTime = 0;
      coinSound.play();

      // 📳 getar
      if (navigator.vibrate) navigator.vibrate(50);

      suckedMoney.push({
        x: lanes[g.lane],
        y: g.y
      });

      player.money += 10;

      // masuk keranjang
      basketStack.push({});

      if (basketStack.length >= maxStack) {
        isFull = true;
        if (navigator.vibrate) navigator.vibrate([100,50,100]);
      }

      gates.splice(i,1);
    }
  });

  suckedMoney.forEach((m,i)=>{
    m.x += (player.x - m.x)*0.2;
    m.y += (player.y - m.y)*0.2;

    if(Math.abs(m.x-player.x)<5 && Math.abs(m.y-player.y)<5){
      suckedMoney.splice(i,1);
    }
  });
}

// draw bg
function drawBG(){
  if(bg.complete){
    ctx.drawImage(bg,0,0,canvas.width,canvas.height);
  }
  ctx.fillStyle="rgba(0,0,0,0.3)";
  ctx.fillRect(0,0,canvas.width,canvas.height);
}

// draw
function draw(){
  drawBG();

  // glow saat penuh
  if(isFull){
    ctx.shadowColor="gold";
    ctx.shadowBlur=30;
  }

  ctx.drawImage(basketImg, player.x-60, player.y-50, 120, 100);
  ctx.shadowBlur=0;

  // 💵 uang menumpuk
  basketStack.forEach((m,i)=>{
    ctx.drawImage(
      moneyImg,
      player.x - 30 + (i%5)*12,
      player.y - 20 - Math.floor(i/5)*10,
      25,
      25
    );
  });

  // FULL text
  if(isFull){
    ctx.fillStyle="yellow";
    ctx.font="bold 20px Arial";
    ctx.fillText("FULL!!", player.x-30, player.y-70);
  }

  // saldo
  ctx.fillStyle="white";
  ctx.font="20px Arial";
  ctx.fillText("$"+player.money, player.x-20, player.y-90);

  // uang jatuh
  gates.forEach(g=>{
    ctx.save();
    ctx.translate(lanes[g.lane], g.y);
    ctx.rotate(g.rot);
    ctx.drawImage(moneyImg, -25, -25, 50, 50);
    ctx.restore();
  });

  // animasi masuk
  suckedMoney.forEach(m=>{
    ctx.drawImage(moneyImg, m.x-15, m.y-15, 30, 30);
  });
}

// loop
function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}
</script>

</body>
</html>
