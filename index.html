<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beach Money Runner</title>
<style>
body { margin:0; overflow:hidden; background:black; }
canvas { display:block; }
</style>
</head>
<body>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = innerWidth;
canvas.height = innerHeight;

// 🌅 Background pantai
const bg = new Image();
bg.src = "https://images.unsplash.com/photo-1507525428034-b723cf961d3e";

// 💵 gambar uang
const moneyImg = new Image();
moneyImg.src = "https://cdn-icons-png.flaticon.com/512/3135/3135706.png";

// lane
const lanes = [
  canvas.width * 0.3,
  canvas.width * 0.5,
  canvas.width * 0.7
];

let laneIndex = 1;

// player
let player = {
  x: lanes[laneIndex],
  y: canvas.height - 150,
  money: 100
};

let gates = [];
let effects = [];
let progress = 0;

// swipe
let startX = 0;
canvas.addEventListener("touchstart", e => startX = e.touches[0].clientX);
canvas.addEventListener("touchend", e => {
  let dx = e.changedTouches[0].clientX - startX;
  if (dx > 40 && laneIndex < 2) laneIndex++;
  if (dx < -40 && laneIndex > 0) laneIndex--;
});

// spawn uang (rintangan)
setInterval(()=>{
  let r = Math.random();
  let mode = r<0.4?"add":r<0.7?"sub":"mul";
  let value = mode==="mul"?2:Math.floor(Math.random()*20)+10;

  gates.push({
    lane: Math.floor(Math.random()*3),
    y: -60,
    mode,
    value,
    rot: 0
  });
},900);

// update
function update(){
  player.x += (lanes[laneIndex] - player.x)*0.15;
  progress += 0.003;

  gates.forEach((g,i)=>{
    g.y += 6;
    g.rot += 0.05;

    if(Math.abs(player.x - lanes[g.lane]) < 35 && Math.abs(player.y - g.y) < 35){

      if(g.mode==="add") player.money += g.value;
      if(g.mode==="sub") player.money -= g.value;
      if(g.mode==="mul") player.money *= g.value;

      // efek uang meledak
      for(let j=0;j<25;j++){
        effects.push({
          x: player.x,
          y: player.y,
          dx:(Math.random()-0.5)*6,
          dy:-Math.random()*6,
          life:40
        });
      }

      gates.splice(i,1);
    }
  });

  effects.forEach((e,i)=>{
    e.x += e.dx;
    e.y += e.dy;
    e.life--;
    if(e.life<=0) effects.splice(i,1);
  });

  if(player.money <= 0){
    alert("Game Over!");
    location.reload();
  }
}

// background
function drawBG(){
  if(bg.complete){
    ctx.drawImage(bg, 0, 0, canvas.width, canvas.height);
  }

  ctx.fillStyle = "rgba(0,0,0,0.3)";
  ctx.fillRect(0,0,canvas.width,canvas.height);
}

// draw
function draw(){
  drawBG();

  // player
  ctx.shadowColor="gold";
  ctx.shadowBlur=25;
  ctx.fillStyle="gold";
  ctx.beginPath();
  ctx.arc(player.x, player.y, 25, 0, Math.PI*2);
  ctx.fill();
  ctx.shadowBlur=0;

  ctx.fillStyle="white";
  ctx.font="20px Arial";
  ctx.textAlign="center";
  ctx.fillText("$"+player.money, player.x, player.y-40);

  // 💵 rintangan uang
  gates.forEach(g=>{
    ctx.save();

    ctx.translate(lanes[g.lane], g.y);
    ctx.rotate(g.rot);

    // glow
    ctx.shadowColor = g.mode==="add"?"lime":g.mode==="sub"?"red":"purple";
    ctx.shadowBlur = 25;

    // gambar uang
    ctx.drawImage(moneyImg, -25, -25, 50, 50);

    ctx.shadowBlur = 0;

    ctx.restore();

    // teks nilai
    ctx.fillStyle="white";
    ctx.font="16px Arial";
    ctx.fillText(
      g.mode==="add"?"+"+g.value:
      g.mode==="sub"?"-"+g.value:
      "x"+g.value,
      lanes[g.lane],
      g.y - 30
    );
  });

  // efek uang pecah
  ctx.fillStyle="gold";
  effects.forEach(e=>{
    ctx.fillRect(e.x, e.y, 4, 4);
  });

  // UI uang
  ctx.fillStyle="#000";
  ctx.fillRect(canvas.width-140,20,120,50);
  ctx.strokeStyle="gold";
  ctx.strokeRect(canvas.width-140,20,120,50);

  ctx.fillStyle="gold";
  ctx.fillText("$"+player.money, canvas.width-80,50);

  // progress bar
  ctx.fillStyle="#222";
  ctx.fillRect(50,20,250,10);
  ctx.fillStyle="gold";
  ctx.fillRect(50,20,250*progress,10);
}

// loop
function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
