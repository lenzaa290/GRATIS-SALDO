<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beach Money Runner</title>

<style>
body { margin:0; overflow:hidden; font-family:Arial; background:black; }
canvas { display:none; }

#loading {
  position:fixed;
  width:100%;
  height:100%;
  background:black;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
}

#intro {
  display:none;
  position:fixed;
  width:100%;
  height:100%;
  background:linear-gradient(#000,#222);
  color:white;
  text-align:center;
  padding:30px;
}

.btn {
  margin-top:20px;
  padding:15px 30px;
  background:gold;
  border:none;
  font-size:18px;
  border-radius:10px;
}
</style>
</head>

<body>

<div id="loading">⏳ Memuat...</div>

<div id="intro">
  <h1 style="color:gold">💰 Cara Bermain</h1>
  <p>👉 Geser kanan & kiri untuk mengumpulkan uang</p>
  <p>🔥 Masukkan ke keranjang sebanyak mungkin</p>
  <p>💸 Cairkan ke <b>SALDO Anda</b></p>

  <button class="btn" onclick="startGame()">▶️ Mulai Sekarang</button>
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = innerWidth;
canvas.height = innerHeight;

// delay intro
setTimeout(()=>{
  loading.style.display="none";
  intro.style.display="block";
},2000);

function startGame(){
  intro.style.display="none";
  canvas.style.display="block";
  loop();
}

// 🌅 background
const bg = new Image();
bg.src = "https://images.unsplash.com/photo-1507525428034-b723cf961d3e";

// 💵 uang
const moneyImg = new Image();
moneyImg.src = "https://cdn-icons-png.flaticon.com/512/3135/3135706.png";

// 🧺 keranjang
const basketImg = new Image();
basketImg.src = "https://cdn-icons-png.flaticon.com/512/263/263115.png";

// lane
const lanes = [
  canvas.width * 0.3,
  canvas.width * 0.5,
  canvas.width * 0.7
];

let laneIndex = 1;

let player = {
  x: lanes[laneIndex],
  y: canvas.height - 120,
  money: 100
};

let gates = [];
let effects = [];
let suckedMoney = []; // animasi masuk ke keranjang

// swipe
let startX = 0;
canvas.addEventListener("touchstart", e => startX = e.touches[0].clientX);
canvas.addEventListener("touchend", e => {
  let dx = e.changedTouches[0].clientX - startX;
  if (dx > 40 && laneIndex < 2) laneIndex++;
  if (dx < -40 && laneIndex > 0) laneIndex--;
});

// spawn uang
setInterval(()=>{
  gates.push({
    lane: Math.floor(Math.random()*3),
    y: -60,
    rot: 0
  });
},700);

// update
function update(){
  player.x += (lanes[laneIndex] - player.x)*0.2;

  gates.forEach((g,i)=>{
    g.y += 6;
    g.rot += 0.05;

    if(Math.abs(player.x - lanes[g.lane]) < 40 && Math.abs(player.y - g.y) < 40){

      // animasi uang masuk
      suckedMoney.push({
        x: lanes[g.lane],
        y: g.y
      });

      player.money += 10;

      gates.splice(i,1);
    }
  });

  // animasi uang ke keranjang
  suckedMoney.forEach((m,i)=>{
    m.x += (player.x - m.x)*0.2;
    m.y += (player.y - m.y)*0.2;

    if(Math.abs(m.x-player.x)<5 && Math.abs(m.y-player.y)<5){
      suckedMoney.splice(i,1);
    }
  });
}

// draw bg
function drawBG(){
  if(bg.complete){
    ctx.drawImage(bg,0,0,canvas.width,canvas.height);
  }
  ctx.fillStyle="rgba(0,0,0,0.3)";
  ctx.fillRect(0,0,canvas.width,canvas.height);
}

// draw
function draw(){
  drawBG();

  // keranjang player
  ctx.drawImage(basketImg, player.x-40, player.y-30, 80, 60);

  // saldo
  ctx.fillStyle="white";
  ctx.font="20px Arial";
  ctx.textAlign="center";
  ctx.fillText("$"+player.money, player.x, player.y-50);

  // uang jatuh
  gates.forEach(g=>{
    ctx.save();
    ctx.translate(lanes[g.lane], g.y);
    ctx.rotate(g.rot);
    ctx.drawImage(moneyImg, -25, -25, 50, 50);
    ctx.restore();
  });

  // animasi masuk keranjang
  suckedMoney.forEach(m=>{
    ctx.drawImage(moneyImg, m.x-15, m.y-15, 30, 30);
  });
}

// loop
function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}
</script>

</body>
</html>
