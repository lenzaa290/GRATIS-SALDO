<!DOCTYPE html>
<html lang="id">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Money Runner Real</title>

<style>
body{margin:0;overflow:hidden;font-family:Arial;background:black;}
canvas{display:none}

/* intro */
#intro{
position:fixed;
width:100%;
height:100%;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
color:white;
background:#000;
text-align:center;
padding:20px;
}
button{padding:12px 25px;background:gold;border:none;border-radius:10px}

/* notif */
#notif{
position:fixed;
top:-120px;
width:100%;
display:flex;
justify-content:center;
transition:0.5s;
z-index:9999;
}
.notif-box{
background:white;
padding:10px;
border-radius:15px;
display:flex;
gap:10px;
width:90%;
max-width:400px;
}
.notif-box img{width:40px}

/* withdraw */
#withdraw{
display:none;
position:fixed;
top:0;
width:100%;
height:100%;
background:#0f172a;
color:white;
text-align:center;
padding:20px;
}
.card{background:#1e293b;padding:20px;border-radius:15px;color:gold;margin-top:20px}
</style>
</head>

<body>

<div id="intro">
<h2>💰 Cara Bermain</h2>
<p>Geser kiri kanan</p>
<button onclick="startGame()">Mulai</button>
</div>

<div id="notif">
<div class="notif-box" onclick="openWithdraw()">
<img src="https://cdn-icons-png.flaticon.com/512/733/733585.png">
<div><b>Notifikasi</b><br>Satu langkah lagi cairkan saldo Anda sekarang</div>
</div>
</div>

<div id="withdraw">
<h2>💰 Penarikan</h2>
<div class="card">$<span id="saldoText"></span></div>
<input id="tujuan" placeholder="Nomor tujuan" style="padding:10px;border-radius:10px;margin-top:15px">
<br>
<button onclick="cairkan()">💸 Cairkan</button>
<div id="status"></div>
</div>

<canvas id="game"></canvas>

<script>
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");
canvas.width=innerWidth;
canvas.height=innerHeight;

// gambar
const bg=new Image();
bg.src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e";

const moneyImg=new Image();
moneyImg.src="https://cdn-icons-png.flaticon.com/512/3135/3135706.png";

const basketImg=new Image();
basketImg.src="https://cdn-icons-png.flaticon.com/512/263/263142.png";

// player
const lanes=[canvas.width*0.3,canvas.width*0.5,canvas.width*0.7];
let lane=1;

let player={x:lanes[1],y:canvas.height-120,money:100};

let items=[];
let notifShown=false;

// start
function startGame(){
intro.style.display="none";
canvas.style.display="block";
loop();
}

// swipe
let startX=0;
canvas.addEventListener("touchstart",e=>startX=e.touches[0].clientX);
canvas.addEventListener("touchend",e=>{
let dx=e.changedTouches[0].clientX-startX;
if(dx>20&&lane<2)lane++;
if(dx<-20&&lane>0)lane--;
});

// spawn
setInterval(()=>{
items.push({lane:Math.floor(Math.random()*3),y:-50});
},600);

// update
function update(){
player.x+= (lanes[lane]-player.x)*0.3;

items.forEach((it,i)=>{
it.y+=7;

if(Math.abs(player.x-lanes[it.lane])<40 && Math.abs(player.y-it.y)<40){
player.money+=10;
items.splice(i,1);

if(player.money>=500&&!notifShown){
notifShown=true;
showNotif();
}
}
});
}

// draw
function draw(){
ctx.drawImage(bg,0,0,canvas.width,canvas.height);

// keranjang
ctx.drawImage(basketImg,player.x-50,player.y-40,100,80);

// uang jatuh
items.forEach(it=>{
ctx.drawImage(moneyImg,lanes[it.lane]-25,it.y,50,50);
});

// saldo
ctx.fillStyle="white";
ctx.fillText("$"+player.money,20,30);
}

// loop
function loop(){
update();
draw();
requestAnimationFrame(loop);
}

// notif
function showNotif(){
notif.style.top="20px";
setTimeout(()=>notif.style.top="-120px",4000);
}

// buka withdraw
function openWithdraw(){
canvas.style.display="none";
withdraw.style.display="block";
saldoText.innerText=player.money;
}

// cairkan
function cairkan(){
let t=tujuan.value;
if(t==""){status.innerHTML="Isi dulu";return;}

status.innerHTML="⏳ Memproses...";
setTimeout(()=>status.innerHTML="💸 Berhasil!",3000);
}
</script>

</body>
</html>
